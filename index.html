<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程照片系統</title>

<style>
body { background:#111; color:#fff; font-family:sans-serif; margin:0;}
.container { padding:15px; max-width:500px; margin:auto;}
button, select, input {
  width:100%; padding:12px; margin-top:8px; border-radius:8px; border:none;
}
.project { background:#222; padding:12px; margin:6px 0; border-radius:8px;}
img { width:100%; margin-top:10px; border-radius:10px;}
.hidden { display:none;}
</style>
</head>

<body>
<div class="container">

<h2>📂 專案列表</h2>

<input id="projectInput" placeholder="輸入專案名稱">
<button id="createProject">➕ 新增專案</button>

<div id="projectList"></div>

<hr>

<div id="projectPage" class="hidden">

<h2 id="title"></h2>
<button id="back">⬅️ 返回</button>

<label>工項</label>
<select id="task">
<option>防水</option>
<option>磁磚</option>
<option>檢測</option>
</select>

<label>地點</label>
<select id="location"></select>
<input id="newLocation" placeholder="新增地點">
<button id="addLocation">新增地點</button>

<label>記錄人</label>
<select id="person"></select>
<input id="newPerson" placeholder="新增人員">
<button id="addPerson">新增人員</button>

<video id="video" autoplay playsinline></video>
<button id="snap">📸 拍照</button>

<canvas id="canvas" class="hidden"></canvas>

<div id="photos"></div>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{

let db = JSON.parse(localStorage.getItem("db")) || {};
let current = "";

// ===== 存 =====
function save(){
  localStorage.setItem("db", JSON.stringify(db));
}

// ===== render 專案 =====
function renderProjects(){
  let html="";
  Object.keys(db).forEach(name=>{
    html += <div class="project" data-name="${name}">${name}</div>;
  });
  document.getElementById("projectList").innerHTML = html || "尚無專案";
}
renderProjects();

// ===== 新增專案 =====
document.getElementById("createProject").addEventListener("click", ()=>{
  let name = document.getElementById("projectInput").value.trim();

  if(!name) return alert("請輸入名稱");
  if(db[name]) return alert("已存在");

  db[name] = {
    photos:[],
    locations:["未設定"],
    persons:["未設定"]
  };

  save();
  renderProjects();
  document.getElementById("projectInput").value="";
});

// ===== 點專案 =====
document.getElementById("projectList").addEventListener("click", (e)=>{
  let name = e.target.dataset.name;
  if(!name) return;

  current = name;
  document.getElementById("title").innerText = name;
  document.getElementById("projectPage").classList.remove("hidden");

  renderSelects();
  loadPhotos();
});

// ===== 返回 =====
document.getElementById("back").addEventListener("click", ()=>{
  document.getElementById("projectPage").classList.add("hidden");
});

// ===== 地點 / 人 =====
function renderSelects(){
  let p = db[current];

  document.getElementById("location").innerHTML =
    p.locations.map(v=><option>${v}</option>).join("");

  document.getElementById("person").innerHTML =
    p.persons.map(v=><option>${v}</option>).join("");
}

// 新增地點
document.getElementById("addLocation").addEventListener("click", ()=>{
  let val = document.getElementById("newLocation").value.trim();
  if(!val) return;

  db[current].locations.push(val);
  save();
  renderSelects();
  document.getElementById("newLocation").value="";
});

// 新增人
document.getElementById("addPerson").addEventListener("click", ()=>{
  let val = document.getElementById("newPerson").value.trim();
  if(!val) return;

  db[current].persons.push(val);
  save();
  renderSelects();
  document.getElementById("newPerson").value="";
});

// ===== 相機 =====
let video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => video.srcObject = stream)
.catch(()=> alert("請允許相機"));

// ===== 拍照 =====
document.getElementById("snap").addEventListener("click", ()=>{

  if(!current) return alert("請先選專案");

  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  let time = new Date().toLocaleString();
  let task = document.getElementById("task").value;
  let loc = document.getElementById("location").value;
  let person = document.getElementById("person").value;

  function draw(gps="無GPS"){
    ctx.fillStyle="rgba(0,0,0,0.75)";
    ctx.fillRect(20,canvas.height-140,360,120);

    ctx.fillStyle="#fff";
    ctx.font="14px sans-serif";

    let y = canvas.height-110;

    ctx.fillText("工項："+task,30,y);
    ctx.fillText("地點："+loc,30,y+22);
    ctx.fillText("人員："+person,30,y+44);
    ctx.fillText("時間："+time,30,y+66);
    ctx.fillText("GPS："+gps,30,y+88);

    let img = canvas.toDataURL("image/jpeg");

    db[current].photos.push({img,time});
    save();
    loadPhotos();
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      let gps = pos.coords.latitude.toFixed(5)+","+pos.coords.longitude.toFixed(5);
      draw(gps);
    },
    ()=>draw()
  );

});

// ===== 照片 =====
function loadPhotos(){
  let html="";
  db[current].photos.forEach(p=>{
    html +=     <img src="${p.img}">     <button onclick="downloadImg('${p.img}')">⬇️ 下載</button>    ;
  });
  document.getElementById("photos").innerHTML = html;
}

// ===== 下載 =====
window.downloadImg = function(img){
  let a = document.createElement("a");
  a.href = img;
  a.download = "工程照片_"+Date.now()+".jpg";
  a.click();
};

});
</script>
