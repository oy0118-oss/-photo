<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程拍照系統 PRO v2</title>
    <style>
        :root { --primary: #007AFF; --danger: #FF3B30; --dark-bg: #1C1C1E; --card-bg: #2C2C2E; }
        body { font-family: -apple-system, system-ui, sans-serif; margin:0; background: var(--dark-bg); color:white; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; 
            background: #3a3a3c; color: white; font-size: 16px; box-sizing: border-box;
        }
        button { 
            padding: 14px; width: 100%; margin-top: 10px; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-snap { background: var(--danger); color: white; }
        .btn-back { background: #48484a; color: white; margin-bottom: 15px; }
        .project-card { 
            background: var(--card-bg); padding: 20px; margin: 12px 0; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        #video { width: 100%; border-radius: 12px; background: #000; margin-top: 10px; }
        .photo-item { background: var(--card-bg); padding: 10px; border-radius: 12px; margin-top: 15px; }
        .photo-item img { width: 100%; border-radius: 8px; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <!--首頁-->
    <div id="homePage" class="page active">
        <h2>📂 工程專案管理</h2>
        <div style="background: var(--card-bg); padding: 15px; border-radius: 12px;">
            <input id="newProjectName" type="text" placeholder="輸入新專案名稱...">
            <button class="btn-add" onclick="createNewProject()">➕ 新增專案</button>
            <button onclick="clearAllData()" style="background:none; color:gray; font-size:12px; margin-top:20px;">⚠️ 清除所有快取資料</button>
        </div>
        <div id="listContent"></div>
    </div>

    <!--拍照頁-->
    <div id="cameraPage" class="page">
        <button class="btn-back" onclick="goToHome()">⬅️ 返回列表</button>
        <h2 id="currentTitle"></h2>
        <select id="taskSelect">
            <option>防水施作</option>
            <option>磁磚黏貼</option>
            <option>結構檢驗</option>
        </select>
        <video id="video" autoplay playsinline></video>
        <button class="btn-snap" onclick="capture()">📸 拍照存檔</button>
        <canvas id="mainCanvas" style="display:none;"></canvas>
        <div id="photoGallery"></div>
    </div>
</div>

<script>
// --- 核心資料處理 ---
let db = {};

// 初始化：嘗試從 LocalStorage 讀取，並處理錯誤格式
function initDB() {
    try {
        const saved = localStorage.getItem("eng_projs_v2");
        db = saved ? JSON.parse(saved) : {};
        // 確保 db 是一個物件
        if (typeof db !== 'object' || db === null) db = {};
    } catch (e) {
        console.error("讀取失敗", e);
        db = {};
    }
    renderProjectList();
}

function saveDB() {
    try {
        localStorage.setItem("eng_projs_v2", JSON.stringify(db));
    } catch (e) {
        alert("儲存失敗！可能是手機記憶體空間已滿，請刪除部分照片再試。");
    }
}

// --- 專案功能 ---
function createNewProject() {
    const input = document.getElementById("newProjectName");
    const name = input.value.trim();
    
    if (!name) {
        alert("請輸入專案名稱");
        return;
    }
    
    if (db[name]) {
        alert("專案名稱重複了");
        return;
    }

    // 初始化專案資料夾
    db[name] = [];
    saveDB();
    input.value = ""; // 清空輸入框
    renderProjectList();
    alert("專案「" + name + "」已建立");
}

function renderProjectList() {
    let html = "";
    const keys = Object.keys(db);
    
    keys.forEach(key => {
        html += `
        <div class="project-card" onclick="openProject('${key}')">
            <span>🏠 ${key}</span>
            <span style="color:#888;">${db[key].length} 張 ></span>
        </div>`;
    });
    
    document.getElementById("listContent").innerHTML = html || "<p style='text-align:center;color:gray;margin-top:20px;'>尚無專案</p>";
}

// --- 導覽功能 ---
let videoStream = null;
function goToHome() {
    document.getElementById("cameraPage").classList.remove("active");
    document.getElementById("homePage").classList.add("active");
    if(videoStream) videoStream.getTracks().forEach(t => t.stop());
}

async function openProject(name) {
    currentProject = name;
    document.getElementById("currentTitle").innerText = name;
    document.getElementById("homePage").classList.remove("active");
    document.getElementById("cameraPage").classList.add("active");
    renderPhotos();

    // 啟動相機
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        document.getElementById("video").srcObject = videoStream;
    } catch (err) {
        alert("無法啟動相機，請確保網址為 HTTPS 或檢查權限設定");
    }
}

// --- 拍照功能 ---
function capture() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("mainCanvas");
    const ctx = canvas.getContext("2d");

    if (video.videoWidth === 0) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    // 繪製浮水印
    const task = document.getElementById("taskSelect").value;
    const timeStr = new Date().toLocaleString();
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    ctx.fillStyle = "white";
    ctx.font = (canvas.height * 0.04) + "px Arial";
    ctx.fillText("專案: " + currentProject + " | 工項: " + task, 30, canvas.height - 60);
    ctx.fillText("時間: " + timeStr, 30, canvas.height - 20);

    const imgData = canvas.toDataURL("image/jpeg", 0.7);
    db[currentProject].unshift({ src: imgData, time: timeStr, task: task });
    saveDB();
    renderPhotos();
}

function renderPhotos() {
    let html = "";
    db[currentProject].forEach((item, index) => {
        html += `
        <div class="photo-item">
            <img src="${item.src}">
            <div style="font-size:12px; padding:5px;">${item.time} - ${item.task}</div>
        </div>`;
    });
    document.getElementById("photoGallery").innerHTML = html;
}

function clearAllData() {
    if(confirm("確定要刪除所有專案跟照片嗎？這動作無法復原。")) {
        localStorage.removeItem("eng_projs_v2");
        location.reload();
    }
}

// 執行初始化
initDB();
</script>
</body>
</html>
