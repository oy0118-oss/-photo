<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程照片系統 PRO+</title>

<style>
body { background:#111; color:#fff; font-family:sans-serif; margin:0;}
.container { padding:15px; max-width:500px; margin:auto;}
button, select, input {
  width:100%; padding:12px; margin-top:8px; border-radius:8px; border:none;
}
.project { background:#222; padding:12px; margin:6px 0; border-radius:8px;}
img { width:100%; margin-top:10px; border-radius:10px;}
.hidden { display:none;}
</style>

</head>

<body>
<div class="container">

<h2>📂 專案列表</h2>

<input id="newProject" placeholder="輸入專案名稱">
<button onclick="addProject()">➕ 新增專案</button>

<div id="projectList"></div>

<hr>

<div id="projectPage" class="hidden">

<h2 id="projectTitle"></h2>
<button onclick="back()">⬅️ 返回</button>

<label>工項</label> <select id="task">

<option>防水</option>
<option>磁磚</option>
<option>檢測</option>
</select>

<label>地點</label> <select id="locationSelect"></select> <input id="newLocation" placeholder="新增地點"> <button onclick="addLocation()">➕ 新增地點</button>

<label>記錄人</label> <select id="personSelect"></select> <input id="newPerson" placeholder="新增記錄人"> <button onclick="addPerson()">➕ 新增記錄人</button>

<video id="video" autoplay playsinline></video> <button onclick="takePhoto()">📸 拍照</button>

<canvas id="canvas" class="hidden"></canvas>

<div id="photos"></div>

</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || {};
let currentProject = "";

// ===== 專案 =====
function addProject(){
  let name=document.getElementById("newProject").value.trim();
  if(!name) return alert("請輸入專案名稱");

  if(projects[name]) return alert("已存在");

  projects[name]={
    photos:[],
    locations:["未設定"],
    persons:["未設定"]
  };

  save();
  renderProjects();
  document.getElementById("newProject").value="";
}

function renderProjects(){
  let html="";
  for(let p in projects){
    html+=`<div class="project" onclick="openProject('${p}')">${p}</div>`;
  }
  document.getElementById("projectList").innerHTML=html;
}
renderProjects();

// ===== 開專案 =====
function openProject(name){
  currentProject=name;
  document.getElementById("projectTitle").innerText=name;
  document.getElementById("projectPage").classList.remove("hidden");

  renderSelects();
  loadPhotos();
}

function back(){
  document.getElementById("projectPage").classList.add("hidden");
}

// ===== 地點 / 人 =====
function renderSelects(){
  let p=projects[currentProject];

  document.getElementById("locationSelect").innerHTML =
    p.locations.map(l=>`<option>${l}</option>`).join("");

  document.getElementById("personSelect").innerHTML =
    p.persons.map(l=>`<option>${l}</option>`).join("");
}

function addLocation(){
  let val=document.getElementById("newLocation").value.trim();
  if(!val) return;
  projects[currentProject].locations.push(val);
  save();
  renderSelects();
  document.getElementById("newLocation").value="";
}

function addPerson(){
  let val=document.getElementById("newPerson").value.trim();
  if(!val) return;
  projects[currentProject].persons.push(val);
  save();
  renderSelects();
  document.getElementById("newPerson").value="";
}

// ===== 相機 =====
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>video.srcObject=s);

// ===== 拍照 =====
function takePhoto(){
  let canvas=document.getElementById("canvas");
  let ctx=canvas.getContext("2d");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  let time=new Date().toLocaleString();
  let task=document.getElementById("task").value;
  let loc=document.getElementById("locationSelect").value;
  let person=document.getElementById("personSelect").value;

  navigator.geolocation.getCurrentPosition(pos=>{

    let gps=pos.coords.latitude.toFixed(5)+","+pos.coords.longitude.toFixed(5);

    // 黑底白字
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(20,canvas.height-160,360,140);

    ctx.fillStyle="#fff";
    ctx.font="16px sans-serif";

    let y=canvas.height-130;

    ctx.fillText("工項："+task,30,y);
    ctx.fillText("地點："+loc,30,y+25);
    ctx.fillText("人員："+person,30,y+50);
    ctx.fillText("時間："+time,30,y+75);
    ctx.fillText("GPS："+gps,30,y+100);

    let img=canvas.toDataURL("image/jpeg");

    projects[currentProject].photos.push({
      img,time,task,loc,person,gps
    });

    save();
    loadPhotos();

  },()=>{
    alert("請開啟定位");
  });
}

// ===== 顯示照片 =====
function loadPhotos(){
  let arr=projects[currentProject].photos;

  let html="";
  arr.forEach(p=>{
    html+=`
    <img src="${p.img}">
    <button onclick="download('${p.img}')">⬇️ 下載</button>
    `;
  });

  document.getElementById("photos").innerHTML=html;
}

// ===== 下載 =====
function download(img){
  let a=document.createElement("a");
  a.href=img;
  a.download="工程照片_"+Date.now()+".jpg";
  a.click();
}

// ===== 存 =====
function save(){
  localStorage.setItem("projects",JSON.stringify(projects));
}
</script>

</body>
</html>
