<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程照片系統 PRO</title>

<style>
body { font-family: sans-serif; margin:0; background:#111; color:white;}
.container { padding:15px; max-width:500px; margin:auto;}
button { padding:12px; width:100%; margin-top:8px; border:none; border-radius:8px; cursor:pointer;}
input, select { width:100%; padding:10px; margin-top:5px; }
.project { background:#222; padding:12px; margin:5px 0; border-radius:8px; cursor:pointer;}
.project:hover { background:#333;}
img { width:100%; margin-top:10px; border-radius:8px; }
.hidden { display:none; }
</style>

</head>

<body>
<div class="container">

<h2>📂 專案列表</h2>

<input id="newProject" placeholder="輸入專案名稱">
<button id="addBtn">➕ 新增專案</button>

<div id="projectList"></div>

<hr>

<div id="projectPage" class="hidden">

<h2 id="projectTitle"></h2>

<button onclick="back()">⬅️ 返回</button>

<label>工項</label> <select id="task">

<option>防水</option>
<option>磁磚</option>
<option>檢測</option>
</select>

<video id="video" autoplay playsinline></video>

<button onclick="takePhoto()">📸 拍照</button>

<canvas id="canvas" class="hidden"></canvas>

<div id="photos"></div>

</div>

</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || {};
let currentProject = "";

// ===== 初始化 =====
document.getElementById("addBtn").addEventListener("click", addProject);

// ===== 渲染專案 =====
function renderProjects(){
  let html="";
  let keys = Object.keys(projects);

  if(keys.length === 0){
    html = "<p>目前沒有專案</p>";
  } else {
    keys.forEach(p=>{
      html += `<div class="project" onclick="openProject('${p}')">${p}</div>`;
    });
  }

  document.getElementById("projectList").innerHTML = html;
}

renderProjects();

// ===== 新增專案 =====
function addProject(){
  let input = document.getElementById("newProject");
  let name = input.value.trim();

  if(!name){
    alert("請輸入專案名稱");
    return;
  }

  if(projects[name]){
    alert("專案已存在");
    return;
  }

  projects[name] = [];
  localStorage.setItem("projects", JSON.stringify(projects));

  input.value = "";
  renderProjects();
}

// ===== 開啟專案 =====
function openProject(name){
  currentProject = name;

  document.getElementById("projectTitle").innerText = name;
  document.getElementById("projectPage").classList.remove("hidden");

  loadPhotos();
}

// ===== 返回 =====
function back(){
  document.getElementById("projectPage").classList.add("hidden");
}

// ===== 啟動相機 =====
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{
  document.getElementById("video").srcObject=stream;
})
.catch(()=>{
  alert("請允許相機權限");
});

// ===== 拍照 =====
function takePhoto(){
  if(!currentProject){
    alert("請先選擇專案");
    return;
  }

  let canvas=document.getElementById("canvas");
  let ctx=canvas.getContext("2d");
  let video=document.getElementById("video");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  let time=new Date().toLocaleString();
  let task=document.getElementById("task").value;

  // 黑底白字
  ctx.fillStyle="rgba(0,0,0,0.8)";
  ctx.fillRect(20,canvas.height-100,350,80);

  ctx.fillStyle="#fff";
  ctx.font="16px sans-serif";

  ctx.fillText("工項："+task,30,canvas.height-60);
  ctx.fillText("時間："+time,30,canvas.height-30);

  let img=canvas.toDataURL("image/jpeg");

  projects[currentProject].push({
    img: img,
    time: time
  });

  localStorage.setItem("projects", JSON.stringify(projects));

  loadPhotos();
}

// ===== 載入照片 =====
function loadPhotos(){
  let arr = projects[currentProject] || [];

  let html="";

  arr.forEach(p=>{
    html += `
    <img src="${p.img}">
    <button onclick="download('${p.img}')">⬇️ 下載</button>
    `;
  });

  document.getElementById("photos").innerHTML = html;
}

// ===== 下載 =====
function download(img){
  let a=document.createElement("a");
  a.href=img;
  a.download="工程照片.jpg";
  a.click();
}
</script>

</body>
</html>
